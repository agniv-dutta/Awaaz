version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: awaaz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  awaaz-api:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/awaaz
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - db
      - redis

  awaaz-worker:
    build: .
    volumes:
      - .:/app
    command: celery -A app.core.celery_app worker -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/awaaz
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - awaaz-api

  awaaz-beat:
    build: .
    volumes:
      - .:/app
    command: celery -A app.core.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/awaaz
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - awaaz-api

volumes:
  postgres_data:
  redis_data:

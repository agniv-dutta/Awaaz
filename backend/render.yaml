services:
  - type: web
    name: awaaz-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./awaaz.db
      - key: SECRET_KEY
        value: awaaz-super-secret-key-change-this-in-production-12345
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

services:
  - type: web
    name: awaaz-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./awaaz.db
      - key: SECRET_KEY
        value: awaaz-super-secret-key-change-this-in-production-12345
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GCS_BUCKET_NAME
        value: ""
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        value: your-gemini-key-here
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-1.5-flash"
      - key: GROQ_API_KEY
        value: your-groq-key-here
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"
